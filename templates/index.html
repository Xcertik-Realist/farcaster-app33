<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Base Deploy Mini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  
  <!-- Farcaster Mini App SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@farcaster/miniapp-sdk/dist/index.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; }
    .mono { font-family: ui-monospace, monospace; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-2xl mx-auto p-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-3">Base Deploy Mini</h1>
      <p class="text-emerald-400">I am the developer • Deploying from my wallet</p>
    </div>

    <div class="bg-gray-900 rounded-3xl p-8">
      <!-- Wallet Status -->
      <div class="flex justify-between items-center mb-8 p-5 bg-gray-800 rounded-2xl">
        <div id="status" class="text-gray-400">Not connected</div>
        <button onclick="connectWallet()" id="connectBtn"
                class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-2xl font-semibold transition">
          Connect My Wallet
        </button>
      </div>

      <!-- Deploy Section -->
      <div id="deploySection" class="hidden space-y-6">
        <div class="bg-gray-800 p-5 rounded-2xl">
          <p class="text-sm text-gray-400 mb-1">Contract</p>
          <p class="font-medium">SimpleStorage v1</p>
          <p class="text-xs text-gray-500 mono">Stores a number on-chain</p>
        </div>

        <button onclick="deployContract()" id="deployBtn"
                class="w-full bg-emerald-600 hover:bg-emerald-700 py-4 rounded-2xl font-bold text-lg transition disabled:opacity-50">
          Deploy from MY Wallet to Base
        </button>

        <div id="result" class="mt-4 text-sm"></div>
      </div>
    </div>

    <div class="text-center text-xs text-gray-500 mt-10">
      You will be the deployer • Gas paid from your wallet • Base Mainnet
    </div>
  </div>

  <script>
    let web3;
    let userAddress = null;

    // Initialize Farcaster Mini App SDK
    async function initFarcaster() {
      try {
        // Wait a tiny bit for the page to render
        await new Promise(resolve => setTimeout(resolve, 100));
        
        // This hides the Farcaster splash screen
        await window.miniapp.sdk.actions.ready();
        console.log("✅ Farcaster Mini App ready");
      } catch (err) {
        console.log("Not running inside Farcaster (normal for direct browser access)");
      }
    }

    async function connectWallet() {
      if (typeof window.ethereum === "undefined") {
        alert("Please install MetaMask, Coinbase Wallet, Rainbow, or another Ethereum wallet");
        return;
      }

      try {
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        userAddress = accounts[0];
        web3 = new Web3(window.ethereum);

        document.getElementById("status").innerHTML = 
          `✅ Connected as Deployer: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
        
        document.getElementById("connectBtn").classList.add("hidden");
        document.getElementById("deploySection").classList.remove("hidden");

        await switchToBase();
      } catch (err) {
        alert("Failed to connect wallet. Please try again.");
      }
    }

    async function switchToBase() {
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0x2105' }]  // Base Mainnet
        });
      } catch (e) {
        if (e.code === 4902) {
          alert("Base network not added. Please add Base Mainnet manually in your wallet.");
        }
      }
    }

    async function deployContract() {
      const btn = document.getElementById("deployBtn");
      const resultDiv = document.getElementById("result");

      btn.disabled = true;
      btn.textContent = "Waiting for wallet confirmation...";
      resultDiv.innerHTML = "";

      try {
        const bytecode = "0x608060405234801561001057600080fd5b5061014e806100206000396000f3fe608060405234801561001057600080fd5b50600436106100415760003560e01c80632e64cec1146100465780636057361d14610064575b600080fd5b61004e61007e565b60405161005b91906100c0565b60405180910390f35b61007c6004803603810190610077919061010c565b610087565b005b60005481565b6000819050806000819055507f8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925816040516100c491906100c0565b60405180910390a150565b6000819050919050565b6100e2816100d5565b82525050565b60006020820190506100fd60008301846100d9565b92915050565b6000813590506101128161015b565b92915050565b60006020828403121561012e5761012d610156565b5b600061013c84828501610103565b91505092915050565b61014e816100d5565b811461015957600080fd5b50565b600080fd6b61016a816100d5565b811461017557600080fd5b5056fea2646970667358221220f1e2d3c4b5a697887766554433221100ffeeddccbbaa9988776655443322110064736f6c63430008140033";

        const contract = new web3.eth.Contract([]);

        const deployTx = contract.deploy({ data: bytecode });

        let gasEstimate = await deployTx.estimateGas({ from: userAddress });
        if (typeof gasEstimate === 'bigint') {
          gasEstimate = Number(gasEstimate);
        }

        const gasLimit = Math.floor(gasEstimate * 1.3);

        const receipt = await deployTx.send({
          from: userAddress,
          gas: gasLimit
        });

        const contractAddress = receipt.options.address;

        resultDiv.innerHTML = `
          <div class="bg-emerald-900 border border-emerald-500 p-6 rounded-2xl">
            <p class="text-emerald-400 font-bold text-xl">✅ Successfully Deployed!</p>
            <p class="mt-4">You are the deployer on Base.</p>
            <p class="mt-3 break-all mono">
              Contract Address: <strong>${contractAddress}</strong>
            </p>
            <a href="https://basescan.org/address/${contractAddress}" 
               target="_blank" 
               class="inline-block mt-4 text-blue-400 underline hover:text-blue-300">
              View on BaseScan →
            </a>
          </div>
        `;

      } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `
          <div class="bg-red-900 border border-red-600 p-6 rounded-2xl">
            <p class="font-bold text-red-300">Deployment failed or cancelled</p>
            <p class="text-sm mt-2 break-words">${error.message || error}</p>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.textContent = "Deploy from MY Wallet to Base";
      }
    }

    // Auto-detect already connected wallet + init Farcaster
    window.addEventListener("load", async () => {
      await initFarcaster();   // ← Important for Farcaster

      if (typeof window.ethereum !== "undefined") {
        const accounts = await window.ethereum.request({ method: "eth_accounts" });
        if (accounts.length > 0) {
          userAddress = accounts[0];
          web3 = new Web3(window.ethereum);
          document.getElementById("status").innerHTML = 
            `✅ Connected as Deployer: ${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
          document.getElementById("connectBtn").classList.add("hidden");
          document.getElementById("deploySection").classList.remove("hidden");
        }
      }
    });
  </script>
</body>
</html>
